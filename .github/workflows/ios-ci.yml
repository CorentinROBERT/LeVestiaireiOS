name: iOS CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Simulator)
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Cache Swift Package Manager
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-xcode-26.5-${{ hashFiles('LeVestiaire.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-xcode-26.5-

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project LeVestiaire.xcodeproj \
            -scheme LeVestiaire

      - name: Build Debug (simulator)
        run: ./Scripts/ci_build.sh

      - name: Run tests
        env:
          # UI tests complets sur main uniquement ; develop = unitaires + build (itération plus rapide).
          RUN_UI_TESTS: ${{ github.ref != 'refs/heads/develop' && github.base_ref != 'develop' && '1' || '0' }}
        run: |
          echo "Branche push: ${GITHUB_REF_NAME:-n/a}"
          echo "Branche cible PR: ${GITHUB_BASE_REF:-n/a}"
          echo "UI tests: ${RUN_UI_TESTS}"
          ./Scripts/ci_test.sh

      - name: Build Release (simulator)
        env:
          CONFIGURATION: Release
        run: ./Scripts/ci_build.sh
