name: iOS Release

# Déclenchement manuel : TestFlight une fois les secrets configurés.
on:
  workflow_dispatch:
    inputs:
      skip_upload:
        description: "Build archive uniquement (sans upload TestFlight)"
        required: false
        default: false
        type: boolean

jobs:
  release:
    name: TestFlight
    runs-on: macos-26
    timeout-minutes: 60
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${BUILD_CERTIFICATE_BASE64}" ]; then
            echo "::error::Secret IOS_DISTRIBUTION_CERTIFICATE_BASE64 manquant."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        id: provisioning
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          if [ -z "${PROVISIONING_PROFILE_BASE64}" ]; then
            echo "::error::Secret IOS_PROVISIONING_PROFILE_BASE64 manquant."
            exit 1
          fi

          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

          if [ -n "${PROVISIONING_PROFILE_NAME}" ]; then
            PROFILE_NAME="${PROVISIONING_PROFILE_NAME}"
          else
            PROFILE_NAME="$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)"
          fi

          echo "profile_name=${PROFILE_NAME}" >> "$GITHUB_OUTPUT"
          echo "Profil installé : ${PROFILE_NAME}"

      - name: Build and upload to TestFlight
        if: ${{ inputs.skip_upload == false }}
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ steps.provisioning.outputs.profile_name }}
        run: bundle exec fastlane beta

      - name: Build archive only
        if: ${{ inputs.skip_upload == true }}
        env:
          IOS_PROVISIONING_PROFILE_NAME: ${{ steps.provisioning.outputs.profile_name }}
        run: |
          xcodebuild \
            -project LeVestiaire.xcodeproj \
            -scheme LeVestiaire \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/LeVestiaire.xcarchive" \
            archive
